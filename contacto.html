<html lang="es">

  <body>
    <nav>
      <ul>
        <li><a href="index.html">Inicio</a></li>

      </ul>
    </nav>

    <header>
      <h1>Contacto</h1>
    </header>

    <main>
      <section>
        <h2>Información de contacto</h2>

        <p>
          <strong>Dirección:</strong> Santiago Tepopula, municipio de Tenango
          del Aire
        </p>
        <iframe
          src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3769.2367227779355!2d-98.85420309999999!3d19.1411125!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x85ce17b7d2b93dd5%3A0x9e2b9227ec019fd2!2sTELEBACHILLERATO%20COMUNITARIO%20NUM.230!5e0!3m2!1ses-419!2smx!4v1773822274888!5m2!1ses-419!2smx"
          width="100%"
          height="300"
          style="border: 0; border-radius: 10px; display: block; margin: auto"
          allowfullscreen=""
          loading="lazy"
        >
        </iframe>

        <p>
          <strong>Teléfono:</strong>
          <a href="tel:5534840312">5534840312</a>
        </p>
        <p>
          <strong>Correo:</strong>
          <a href="mailto:tbc.plantel230@edugem.gob.mx">
            tbc.plantel230@edugem.gob.mx
          </a>
        </p>
      </section>

      <h3>Envíanos un mensaje</h3>
      <form
        id="formulario"
        action="https://formspree.io/f/xyknoaja"
        method="post"
      >
        <input
          type="text"
          name="nombre"
          placeholder="Tu nombre"
          required
        /><br /><br />

        <input
          type="email"
          name="email"
          placeholder="Tu correo"
          required
        /><br /><br />

        <textarea
          name="mensaje"
          placeholder="Escribe tu mensaje"
          required
        ></textarea
        ><br /><br />

        <button type="submit">Enviar</button>
      </form>
      <p id="mensaje-exito" class="mensaje-exito">
        mensaje enviado correctamente
      </p>
    </main>
    <script>
      const form = document.getElementById("formulario");
      const mensaje = document.getElementById("mensaje-exito");

      form.addEventListener("submit", async function (e) {
        e.preventDefault();

        const data = new FormData(form);

        const response = await fetch(form.action, {
          method: form.method,
          body: data,
          headers: {
            Accept: "application/json",
          },
        });

        if (response.ok) {
          mensaje.style.display = "block";
          form.reset();
        } else {
          alert("Hubo un error al enviar el mensaje ❌");
        }
      });
    </script>
  </body>
</html>
